<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f1f5f9;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#0f172a;
    color:white;
    position:fixed;
}

.sidebar h2{
    text-align:center;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
}

.sidebar a:hover{
    background:#1e293b;
}

.main{
    margin-left:250px;
    padding:30px;
}

.card{
    width:220px;
    background:white;
    display:inline-block;
    margin:10px;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 2px 8px rgba(0,0,0,0.2);
    text-align:center;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Ship Traffic</h2>

<a href="#">Dashboard</a>
<a href="/search">Search Location</a>
<a href="/prediction">Prediction</a>
<a href="#">Reports</a>
<a href="/">Logout</a>

</div>

<div class="main">

<h1>Dashboard</h1>

<div class="card">
<h2>125</h2>
<p>Total Ships</p>
</div>

<div class="card">
<h2>45</h2>
<p>Active Routes</p>
</div>

<div class="card">
<h2>32</h2>
<p>Predictions</p>
</div>

<div class="card">
<h2>5</h2>
<p>Alerts</p>
</div>

</div>

</body>
</html>
