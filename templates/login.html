<!DOCTYPE html>
<html>
<head>
    <title>Ship Traffic Prediction System</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#2563eb;
            margin-bottom:30px;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:95%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

<div class="login-box">

<h1>Ship Traffic Prediction</h1>

<form action="/dashboard">

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
